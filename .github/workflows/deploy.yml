name: Deploy to GitHub Pages

on:
  push:
    branches: [ pp/dev ]
  workflow_dispatch:
  repository_dispatch:
    types: [ rebuild ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Clone docs repo to fill contents
        uses: actions/checkout@v4
        with:
            repository: ptrptrd/docs
            path: ./docs
      - name: Check folder structure
        run: ls -la
      - name: Install, build, and upload your site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4